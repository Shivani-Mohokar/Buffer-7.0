version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: gtp_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=green_transport

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gtp_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/green_transport
      - JWT_SECRET=${JWT_SECRET:-green-secret-key}
      - TOMTOM_API_KEY=${TOMTOM_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./frontend:/app/frontend:ro

volumes:
  mongo_data:
